name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: ${{ vars.CODEQL_ADVANCED_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [actions, python]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Provide legacy workspace alias for CodeQL default setup state
        run: |
          LEGACY_ROOT="/home/runner/work/codex-plugin-scanner"
          mkdir -p "$LEGACY_ROOT"
          ln -sfn "$GITHUB_WORKSPACE" "$LEGACY_ROOT/codex-plugin-scanner"
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          source-root: .
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          category: /language:${{ matrix.language }}
