name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Target repository"
        required: true
        default: pypi
        type: choice
        options:
          - testpypi
          - pypi
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: hol-guard-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + Verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra publish --extra cisco
      - name: Compute publish version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_VERSION=$(python3 -c "import tomllib; p=tomllib.load(open('pyproject.toml','rb')); print(p['project']['version'])")
          VERSION="$BASE_VERSION"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            # Check git tags first
            LAST_TAG=$(git tag --list 'v*' --sort=-version:refname 2>/dev/null | head -n1)
            LAST_TAG_VERSION="${LAST_TAG#v}"

            # Also check GitHub releases (they may exist without corresponding git tags)
            # GH_TOKEN provided via env block above
            # Null-safe: returns empty if no releases exist
            # Fetch all releases (--limit 100) and pick max semver
            # Filter to strict semver tags (vX.Y.Z) to exclude non-semver like "nightly" or "rc"
            GH_RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null | \
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//' | sort -V 2>/dev/null || echo "")
            GH_RELEASE_VERSION=$(echo "$GH_RELEASES" | grep -v '^$' | tail -n1)

            # Use whichever version is higher
            if [[ -n "$GH_RELEASE_VERSION" && -n "$LAST_TAG_VERSION" ]]; then
              COMPARE=$(printf '%s\n%s\n' "$LAST_TAG_VERSION" "$GH_RELEASE_VERSION" | sort -V | tail -n1)
              HIGHEST="$COMPARE"
            elif [[ -n "$GH_RELEASE_VERSION" ]]; then
              HIGHEST="$GH_RELEASE_VERSION"
            elif [[ -n "$LAST_TAG_VERSION" ]]; then
              HIGHEST="$LAST_TAG_VERSION"
            fi

            if [[ -n "$HIGHEST" ]]; then
              IFS=. read -r MAJOR MINOR PATCH <<< "$HIGHEST"
              if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
                echo "Unsupported release tag format: $HIGHEST" >&2
                exit 1
              fi
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"
      - name: Stamp package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "1,/^version = /{s/^version = .*/version = \"$VERSION\"/}" pyproject.toml
          sed -i "1,/^__version__ = /{s/^__version__ = .*/__version__ = \"$VERSION\"/}" src/codex_plugin_scanner/version.py
      - name: Build Guard package (hol-guard)
        run: |
          cp pyproject.toml pyproject.toml.bak
          python3 - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = text.replace('name = "hol-guard"', 'name = "hol-guard"', 1)
          text = text.replace(
              'description = "Protect local AI harnesses with HOL Guard and run scanner checks for Codex, Claude, Cursor, Gemini, and OpenCode."',
              'description = "Protect local AI harnesses with HOL Guard before tools run in Codex, Claude Code, Cursor, Gemini, and OpenCode."',
              1,
          )
          start = text.index("[project.scripts]")
          end = text.index("\n\n[project.urls]")
          scripts = "[project.scripts]\n" \
              'hol-guard = "codex_plugin_scanner.cli:main"\n' \
              'plugin-guard = "codex_plugin_scanner.cli:main"'
          text = text[:start] + scripts + text[end:]
          path.write_text(text, encoding="utf-8")
          PY
          uv run --no-sync python -m build
          mv pyproject.toml.bak pyproject.toml
      - name: Build scanner package (plugin-scanner)
        run: |
          cp pyproject.toml pyproject.toml.bak
          python3 - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = text.replace('name = "hol-guard"', 'name = "plugin-scanner"', 1)
          text = text.replace(
              'description = "Protect local AI harnesses with HOL Guard and run scanner checks for Codex, Claude, Cursor, Gemini, and OpenCode."',
              'description = "Lint, verify, and gate plugin ecosystems for maintainers, CI, and publish workflows."',
              1,
          )
          start = text.index("[project.scripts]")
          end = text.index("\n\n[project.urls]")
          scripts = "[project.scripts]\n" \
              'plugin-scanner = "codex_plugin_scanner.cli:main"\n' \
              'plugin-ecosystem-scanner = "codex_plugin_scanner.cli:main"'
          text = text[:start] + scripts + text[end:]
          path.write_text(text, encoding="utf-8")
          PY
          uv run --no-sync python -m build
          mv pyproject.toml.bak pyproject.toml
      - name: Verify distributions
        run: uv run --no-sync twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          skip-existing: true

  release:
    name: Create GitHub Release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - name: Skip if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate changelog
        if: steps.release_exists.outputs.exists == 'false'
        id: changelog
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Get the range of commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 --exclude="v${VERSION}" 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Build release notes
          cat > release-notes.md << EOF
          ## v${VERSION}

          ### What's Changed
          ${LOG}

          ### Installation
          Base install:
          \`\`\`bash
          uv tool install hol-guard==${VERSION}
          \`\`\`

          \`\`\`bash
          uv tool install plugin-scanner==${VERSION}
          \`\`\`

          Full Cisco coverage on Python 3.11+:
          \`\`\`bash
          uv tool install "hol-guard[cisco]==${VERSION}"
          \`\`\`

          \`\`\`bash
          uv tool install "plugin-scanner[cisco]==${VERSION}"
          \`\`\`

          \`\`\`bash
          docker pull ghcr.io/hashgraph-online/ai-plugin-scanner:${VERSION}
          \`\`\`

          **Full Changelog**: https://github.com/hashgraph-online/ai-plugin-scanner/compare/${LAST_TAG}...v${VERSION}
          EOF

          echo "notes_path=release-notes.md" >> $GITHUB_OUTPUT
      - name: Attest GitHub release assets
        if: steps.release_exists.outputs.exists == 'false'
        id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            dist/*
      - name: Materialize provenance bundle
        if: steps.release_exists.outputs.exists == 'false'
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          cp "${{ steps.provenance.outputs.bundle-path }}" "dist/plugin-scanner-v${VERSION}.intoto.jsonl"
      - name: Collect release asset files
        if: steps.release_exists.outputs.exists == 'false'
        id: release_assets
        run: |
          mapfile -d '' ASSET_FILES < <(find dist -maxdepth 1 -type f -print0 | sort -z)
          if [ "${#ASSET_FILES[@]}" -eq 0 ]; then
            echo "No release asset files found in dist/" >&2
            exit 1
          fi
          {
            echo "files<<EOF"
            for asset in "${ASSET_FILES[@]}"; do
              printf '%s\n' "$asset"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        if: steps.release_exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          mapfile -t RELEASE_ASSETS <<'EOF'
          ${{ steps.release_assets.outputs.files }}
          EOF
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target main \
            --notes-file ${{ steps.changelog.outputs.notes_path }} \
            "${RELEASE_ASSETS[@]}"

  publish-container:
    name: Publish container image
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Stamp package version
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          sed -i "1,/^version = /{s/^version = .*/version = \"$VERSION\"/}" pyproject.toml
          sed -i "1,/^__version__ = /{s/^__version__ = .*/__version__ = \"$VERSION\"/}" src/codex_plugin_scanner/version.py
      - name: Prepare image tags
        id: tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          {
            echo "value<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
