name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Target repository"
        required: true
        default: pypi
        type: choice
        options:
          - testpypi
          - pypi
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: codex-plugin-scanner-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + Verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev --group publish
      - name: Compute publish version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          BASE_VERSION=$(python3 -c "import tomllib; p=tomllib.load(open('pyproject.toml','rb')); print(p['project']['version'])")
          VERSION="$BASE_VERSION"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            LAST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
            if [[ -n "$LAST_TAG" ]]; then
              IFS=. read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
              if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
                echo "Unsupported release tag format: $LAST_TAG" >&2
                exit 1
              fi
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"
      - name: Stamp package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "1,/^version = /{s/^version = .*/version = \"$VERSION\"/}" pyproject.toml
          sed -i "1,/^__version__ = /{s/^__version__ = .*/__version__ = \"$VERSION\"/}" src/codex_plugin_scanner/version.py
      - name: Build package
        run: uv run --no-sync python -m build
      - name: Verify distributions
        run: uv run --no-sync twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          skip-existing: true

  release:
    name: Create GitHub Release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Skip if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate changelog
        if: steps.release_exists.outputs.exists == 'false'
        id: changelog
        run: |
          # Get the range of commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 --exclude="v${VERSION}" 2>/dev/null || echo "")
          VERSION="${{ needs.build.outputs.version }}"

          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Build release notes
          cat > release-notes.md << EOF
          ## v${VERSION}

          ### What's Changed
          ${LOG}

          ### Installation
          \`\`\`bash
          uv tool install codex-plugin-scanner==${VERSION}
          \`\`\`

          **Full Changelog**: https://github.com/hashgraph-online/codex-plugin-scanner/compare/${LAST_TAG}...v${VERSION}
          EOF

          echo "notes_path=release-notes.md" >> $GITHUB_OUTPUT
      - name: Build GitHub Action bundle
        if: steps.release_exists.outputs.exists == 'false'
        id: action_bundle
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          BUNDLE_ROOT="dist/github-action-bundle"
          BUNDLE_PATH="dist/hol-codex-plugin-scanner-action-v${VERSION}.zip"

          mkdir -p "${BUNDLE_ROOT}"
          cp action/action.yml "${BUNDLE_ROOT}/action.yml"
          cp action/README.md "${BUNDLE_ROOT}/README.md"
          cp LICENSE "${BUNDLE_ROOT}/LICENSE"
          cp SECURITY.md "${BUNDLE_ROOT}/SECURITY.md"

          (
            cd "${BUNDLE_ROOT}"
            zip -rq "../$(basename "${BUNDLE_PATH}")" .
          )

          echo "bundle_path=${BUNDLE_PATH}" >> $GITHUB_OUTPUT
      - name: Create release
        if: steps.release_exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file ${{ steps.changelog.outputs.notes_path }} \
            "${{ steps.action_bundle.outputs.bundle_path }}#hol-codex-plugin-scanner-action-v${VERSION}.zip"
